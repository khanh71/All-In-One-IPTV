name: Update IPTV Playlist

on:
  schedule:
    # Chạy lúc 1:00 sáng theo giờ Việt Nam (UTC+7) → 18:00 UTC hôm trước
    - cron: "0 18 * * *"
  workflow_dispatch:   # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run IPTV updater
        run: python scripts/update_iptv.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iptv.m3u
          if git diff --cached --quiet; then
            echo "Không có thay đổi, bỏ qua commit."
          else
            git commit -m "chore: cập nhật IPTV playlist $(date +'%Y-%m-%d %H:%M') ICT"
            git push
          fi
