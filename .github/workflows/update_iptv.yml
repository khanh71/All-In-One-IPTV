name: Update IPTV Playlist

on:
  schedule:
    - cron: "0 18 * * *"   # 01:00 ICT hàng ngày
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.6"

      - name: Install dependencies
        run: pip install requests

      - name: Set Timezone to Vietnam (ICT)
        run: sudo timedatectl set-timezone Asia/Ho_Chi_Minh

      - name: List files (debug)
        run: |
          echo "Hiện tại là: $(date +'%Y-%m-%d %H:%M:%S %Z')"
          ls -la

      - name: Run IPTV updater
        run: python update_iptv.py

      - name: Commit & push http-iptv.m3u
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add http-iptv.m3u
          
          # Lấy thời gian hiện tại theo định dạng VN
          VIETNAM_TIME=$(date +'%d/%m/%Y %H:%M')
          
          git diff --cached --quiet || git commit -m "🔄 Auto-update IPTV ($VIETNAM_TIME ICT)"
          git push