name: Update IPTV Playlist

on:
  schedule:
    # 18:00 UTC = 01:00 ICT (UTC+7) every day
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write   # cho phép push file vào repo

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run IPTV updater
        run: python update_iptv.py

      - name: Commit & push http-iptv.m3u
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add http-iptv.m3u
          git diff --cached --quiet || git commit -m "🔄 Auto-update IPTV $(date +'%Y-%m-%d %H:%M ICT')"
          git push